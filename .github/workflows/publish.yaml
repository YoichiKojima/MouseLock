name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller --onefile --noconsole --name "MouseLock" --icon "assets\icon.ico" --add-data "assets;assets" --hidden-import app --distpath ".\build" main.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: MouseLock-Windows
          path: build/MouseLock.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: MouseLock-Windows

      - name: Extract changelog for this version
        run: |
          VERSION="${{ github.ref_name }}"
          awk -v ver="$VERSION" '
            $0 ~ "^## *" ver " *$" { found=1; next }
            /^## / { if (found) exit }
            found { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "::error::No changelog found for $VERSION. Add a '## $VERSION' section to CHANGELOG.md"
            exit 1
          fi
          echo "Release notes for $VERSION:"
          cat release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: MouseLock.exe
          body_path: release_notes.md
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
